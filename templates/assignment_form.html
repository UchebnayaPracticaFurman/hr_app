{% extends "base.html" %}

{% block title %}Назначение сотрудника{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">📝 Назначение сотрудника: {{ employee.full_name() }}</div>
    
    <form method="POST" style="padding: 1.25rem;">
        <div class="form-group">
            <label>Штатная единица *</label>
            <select name="staffing_id" required>
                <option value="">Выберите должность</option>
                {% for s in staffing_list %}
                <option value="{{ s.id }}" {% if s.is_occupied %}disabled{% endif %}>
                    {{ s.department.name }} → {{ s.position.name }} 
                    ({{ s.rate }} ставки, {{ "{:,.2f}".format(s.salary) }} ₽)
                    {% if s.position.is_head or s.position.category in ['top_management', 'middle_management'] %}
                        👔 РУКОВОДИТЕЛЬ
                        {% if s.is_occupied %}
                            - ЗАНЯТО ({{ s.current_holder_name }})
                        {% endif %}
                    {% endif %}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Дата начала *</label>
            <input type="date" name="start_date" value="{{ employee.hire_date }}" required>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_main" checked>
                Основное место работы
            </label>
        </div>
        
        <div class="form-group">
            <label>Номер договора</label>
            <input type="text" name="contract_number" placeholder="ТД-001">
        </div>
        
        <div class="form-group">
            <label>Дата договора</label>
            <input type="date" name="contract_date">
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('view_employee', id=employee.id) }}" class="btn btn-secondary">↩️ Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
