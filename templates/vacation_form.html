{% extends "base.html" %}

{% block title %}Добавление отпуска{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        🌴 Добавление отпуска для: {{ employee.full_name() }}
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label>Тип отпуска *</label>
            <select name="type" required>
                <option value="annual">Ежегодный оплачиваемый</option>
                <option value="additional">Дополнительный</option>
                <option value="unpaid">Без сохранения зарплаты</option>
                <option value="educational">Учебный</option>
                <option value="maternity">По беременности и родам</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Дата начала *</label>
            <input type="date" name="start_date" required>
        </div>
        
        <div class="form-group">
            <label>Дата окончания *</label>
            <input type="date" name="end_date" required>
        </div>
        
        <div class="form-group">
            <label>Статус</label>
            <select name="status">
                <option value="planned">Запланирован</option>
                <option value="approved">Согласован</option>
                <option value="completed">Завершён</option>
                <option value="cancelled">Отменён</option>
            </select>
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('view_employee', id=employee.id) }}" class="btn btn-warning">↩️ Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
