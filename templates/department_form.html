{% extends "base.html" %}

{% block title %}{{ 'Редактирование' if department else 'Добавление' }} отдела{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">{{ '✏️ Редактирование' if department else '➕ Добавление' }} отдела</div>
    
    <form method="POST" action="{{ url_for('add_department') if not department else url_for('edit_department', id=department.id) }}">
        <div class="form-group">
            <label>Название отдела *</label>
            <input type="text" name="name" value="{{ department.name if department else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>Код отдела</label>
            <input type="text" name="code" value="{{ department.code if department else '' }}" placeholder="Например: D-001">
        </div>
        
        <div class="form-group">
            <label>Родительский отдел</label>
            <select name="parent_department_id">
                <option value="">Нет (головной отдел)</option>
                {% for dept in departments %}
                    {% if not department or dept.id != department.id %}
                    <option value="{{ dept.id }}" {% if department and department.parent_department_id == dept.id %}selected{% endif %}>
                        {{ dept.name }}
                    </option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" rows="4">{{ department.description if department else '' }}</textarea>
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="{{ url_for('departments') }}" class="btn btn-warning">↩️ Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
